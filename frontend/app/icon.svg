<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ffb86b"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- rounded square badge -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#bg)"/>

  <!-- subtle inner highlight -->
  <rect x="2" y="2" width="60" height="30" rx="14" ry="14" fill="white" opacity="0.10"/>

  <!-- waveform: 5 rounded bars, center tallest, symmetric, suggests voice -->
  <g fill="url(#wave)" filter="url(#glow)">
    <rect x="13" y="26"  width="5" height="12" rx="2.5"/>
    <rect x="22" y="20"  width="5" height="24" rx="2.5"/>
    <rect x="30" y="14"  width="5" height="36" rx="2.5"/>
    <rect x="38" y="20"  width="5" height="24" rx="2.5"/>
    <rect x="46" y="26"  width="5" height="12" rx="2.5"/>
  </g>
</svg>
